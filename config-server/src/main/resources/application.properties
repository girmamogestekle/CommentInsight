# ===============================
# Application Info
# ===============================
server.port=${SERVER_PORT}
spring.application.name=config-server



# ===============================
# Configuration Server Info
# ===============================
spring.cloud.config.server.git.uri=${CONFIG_REPO_URL}
spring.cloud.config.server.git.default-label=${CONFIG_REPO_BRANCH}
spring.cloud.config.server.git.username=${CONFIG_REPO_USERNAME}
spring.cloud.config.server.git.password=${CONFIG_REPO_TOKEN}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.search-paths=application,discovery-service,api-gateway-service,connector-service,youtube-connector-service


# ===============================
# Management Health Endpoints
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always