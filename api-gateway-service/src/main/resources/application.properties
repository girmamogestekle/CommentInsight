# ===============================
# Import Files
# ===============================
spring.config.import=file:credentials.properties



# ===============================
# Application Info
# ===============================
spring.application.name=api-gateway-service
server.port=${SERVER.PORT}



# ===============================
# Eureka Client Configuration
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true



# ===============================
# Redis For Rate Limiter
# ===============================
#spring.data.redis.host=localhost
#spring.data.redis.port=6379



# ===============================
# Spring Cloud Gateway Routes
# ===============================

# ===============================
# Connector Service Route
# ===============================

# Route to connector-service
spring.cloud.gateway.routes[0].id=connector-service
spring.cloud.gateway.routes[0].uri=lb://connector-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/connectors/**

# Circuit Breaker + Fallback
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=connectorCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/connector-service

# Retry
spring.cloud.gateway.routes[0].filters[1].name=Retry
spring.cloud.gateway.routes[0].filters[1].args.retries=3
spring.cloud.gateway.routes[0].filters[1].args.statuses=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
spring.cloud.gateway.routes[0].filters[1].args.methods=GET,POST

## Rate Limiting
#spring.cloud.gateway.routes[0].filters[2].name=RequestRateLimiter
#spring.cloud.gateway.routes[0].filters[2].args.redis-rate-limiter.replenishRate=5
#spring.cloud.gateway.routes[0].filters[2].args.redis-rate-limiter.burstCapacity=10
#spring.cloud.gateway.routes[0].filters[2].args.key-resolver=#{@userKeyResolver}


# ===============================
# YouTube Connector Service Route
# ===============================

# Route to youtube-connector-service
spring.cloud.gateway.routes[1].id=youtube-connector-service
spring.cloud.gateway.routes[1].uri=lb://youtube-connector-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/youtube/**

# Circuit Breaker + Fallback
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=youtubeCircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/youtube-connector-service

# Retry
spring.cloud.gateway.routes[1].filters[1].name=Retry
spring.cloud.gateway.routes[1].filters[1].args.retries=3
spring.cloud.gateway.routes[1].filters[1].args.statuses=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
spring.cloud.gateway.routes[1].filters[1].args.methods=GET,POST

# Rate Limiting
#spring.cloud.gateway.routes[1].filters[2].name=RequestRateLimiter
#spring.cloud.gateway.routes[1].filters[2].args.redis-rate-limiter.replenishRate=5
